<div class="row mt-4">
	<div class="col-xs-12 col-sm-6 col-md-3" *ngFor="let member of members">
		<div class="image-flip" >
			<div class="mainflip flip-0">
				<div class="frontside">
					<div class="card">
						<div class="card-body text-center">
							<p>
								<img class="img-fluid" src="https://bootdey.com/img/Content/avatar/
									avatar4.png" alt="card image">
							</p>
							<h4 class="card-title">{{member.name}}</h4>
							<p class="card-text">
							</p>
						</div>
					</div>
				</div>
				<div class="backside">
					<div class="card">
						<div class="card-body text-center mt-4">
							<h4 class="card-title">{{member.name}}</h4>
							<p class="card-text">
							a
							</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
